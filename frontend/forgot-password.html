<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Royal Resort</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🔑</div>
      <h2>Reset Password</h2>
      <p>Follow the steps below</p>
    </div>

    <!-- STEP 1: Enter email -->
    <div style="background:#eaf4fb;border-radius:8px;padding:12px 16px;margin-bottom:18px;font-size:0.88rem;color:#1a5276">
      <strong>Step 1:</strong> Enter your email → get a reset token<br/>
      <strong>Step 2:</strong> Copy the token → paste below → set new password
    </div>

    <div id="fpAlert"></div>
    <div class="form-group">
      <label>📧 Your Registered Email</label>
      <input type="email" class="form-control" id="fpEmail" placeholder="you@email.com"/>
    </div>
    <button class="btn btn-primary btn-block" onclick="submitForgotPassword()">Get Reset Token</button>

    <hr style="margin:22px 0;border:none;border-top:1px solid #eee"/>

    <!-- STEP 2: Use token to reset -->
    <p style="font-size:0.9rem;font-weight:600;color:var(--text);margin-bottom:12px">🔐 Reset Your Password</p>
    <div id="resetAlert"></div>
    <div class="form-group">
      <label>Reset Token (paste here)</label>
      <input type="text" class="form-control" id="resetToken" placeholder="Paste token from above"/>
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" class="form-control" id="resetPass" placeholder="Min 6 characters"/>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" class="form-control" id="resetConfirm" placeholder="Repeat password"/>
    </div>
    <button class="btn btn-success btn-block" onclick="submitResetPassword()">✅ Reset Password</button>

    <div class="auth-footer mt-2"><a href="login.html">← Back to Login</a></div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
