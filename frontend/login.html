<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Royal Resort</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon">🏨</div>
      <h2>Royal Resort</h2>
      <p>Sign in to your account</p>
    </div>
    <div id="loginAlert"></div>
    <div class="d-flex gap-1 mb-2">
      <button class="btn btn-primary btn-sm" id="tabUser"  onclick="switchTab('user')">👤 User Login</button>
      <button class="btn btn-outline btn-sm" id="tabAdmin" onclick="switchTab('admin')">🔐 Admin Login</button>
    </div>
    <!-- User form -->
    <div id="userForm">
      <div class="form-group"><label>Email Address</label><input type="email" class="form-control" id="email" placeholder="you@email.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" class="form-control" id="password" placeholder="••••••••"/></div>
      <button class="btn btn-primary btn-block mt-1" onclick="loginUser()">Login</button>
      <div class="auth-footer mt-2">
        <a href="forgot-password.html">Forgot password?</a> &nbsp;|&nbsp; <a href="register.html">Create account</a>
      </div>
    </div>
    <!-- Admin form -->
    <div id="adminForm" class="hidden">
      <div class="form-group"><label>Admin Username</label><input type="text" class="form-control" id="adminUsername" placeholder="admin"/></div>
      <div class="form-group"><label>Password</label><input type="password" class="form-control" id="adminPassword" placeholder="••••••••"/></div>
      <button class="btn btn-primary btn-block mt-1" onclick="loginAdmin()">Admin Login</button>
      <div class="auth-footer mt-2"><a href="index.html">← Back to Home</a></div>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
