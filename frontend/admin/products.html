<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Products — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">🏨 <span>Royal Resort</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="categories.html"><span class="icon">🏷️</span><span>Categories</span></a>
      <a href="products.html" class="active"><span class="icon">🛏️</span><span>Products</span></a>
      <a href="bookings.html"><span class="icon">📅</span><span>Bookings</span></a>
      <a href="users.html"><span class="icon">👥</span><span>Users</span></a>
      <a href="contacts.html"><span class="icon">✉️</span><span>Messages</span></a>
      <a href="services.html"><span class="icon">✨</span><span>Services</span></a>
    </nav>
    <div class="sidebar-footer"><a href="../login.html" onclick="clearAuth()"><span class="icon">🚪</span><span>Logout</span></a></div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar"><h1>🛏️ Product Management</h1></div>
    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-card-header"><h3>➕ Add New Product</h3></div>
        <div class="admin-card-body">
          <div id="prodAlert"></div>
          <div class="form-row">
            <div class="form-group"><label>Category *</label><select class="form-control" id="prodCat"><option value="">-- Select --</option></select></div>
            <div class="form-group"><label>Product Name *</label><input type="text" class="form-control" id="prodName" placeholder="e.g. Ocean View Deluxe"/></div>
          </div>
          <div class="form-group"><label>Description</label><textarea class="form-control" id="prodDesc" rows="2" placeholder="Describe the room..."></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>Price (₹/night) *</label><input type="number" class="form-control" id="prodPrice" placeholder="5499"/></div>
            <div class="form-group"><label>Total Rooms</label><input type="number" class="form-control" id="prodTotal" value="1" min="1"/></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Available Rooms</label><input type="number" class="form-control" id="prodAvail" value="1" min="0"/></div>
            <div class="form-group"><label>Image (optional)</label><input type="file" class="form-control" id="prodImage" accept="image/*"/></div>
          </div>
          <button class="btn btn-primary" onclick="addProduct()">➕ Add Product</button>
        </div>
      </div>
      <div class="admin-card">
        <div class="admin-card-header"><h3>All Products</h3></div>
        <div class="admin-card-body"><div id="prodTable"><div class="spinner"></div></div></div>
      </div>
    </div>
  </main>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="closeEdit()">×</button>
    <div class="modal-title">✏️ Edit Product</div>
    <div id="editAlert"></div>
    <div class="form-group"><label>Category *</label><select class="form-control" id="editCat"></select></div>
    <div class="form-group"><label>Name *</label><input type="text" class="form-control" id="editName"/></div>
    <div class="form-group"><label>Description</label><textarea class="form-control" id="editDesc" rows="2"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Price (₹/night) *</label><input type="number" class="form-control" id="editPrice"/></div>
      <div class="form-group"><label>Total Rooms</label><input type="number" class="form-control" id="editTotal" min="1"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Available Rooms</label><input type="number" class="form-control" id="editAvail" min="0"/></div>
      <div class="form-group"><label>Status</label>
        <select class="form-control" id="editStatus">
          <option value="true">✅ Active</option>
          <option value="false">❌ Inactive</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>🖼️ Update Image (optional)</label><input type="file" class="form-control" id="editImage" accept="image/*"/></div>
    <input type="hidden" id="editId"/>
    <button class="btn btn-primary btn-block" onclick="saveEdit()">💾 Save Changes</button>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
let allCats = [];
window.addEventListener("DOMContentLoaded", async () => {
  if (!isAdmin()) { window.location.href = "../login.html"; return; }
  allCats = await CategoryAPI.getAllAdmin();
  const addSel  = document.getElementById("prodCat");
  const editSel = document.getElementById("editCat");
  allCats.forEach(c => {
    addSel.innerHTML  += `<option value="${c.id}">${c.name}</option>`;
    editSel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });
  await loadProducts();
});

async function loadProducts() {
  try {
    const products = await ProductAPI.getAllAdmin();        // admin/all endpoint
    const el = document.getElementById("prodTable");
    if (!products.length) { el.innerHTML = `<p style="color:var(--muted)">No products yet.</p>`; return; }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Rooms</th><th>Avail</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${products.map(p => {
        const cat = allCats.find(c => c.id === p.category_id);
        return `<tr>
          <td>#${p.id}</td>
          <td>${p.image
            ? `<img src="${imageUrl(p.image)}" style="width:55px;height:42px;object-fit:cover;border-radius:4px"/>`
            : `<div style="width:55px;height:42px;background:#1a5276;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white">🛏️</div>`}</td>
          <td><strong>${p.name}</strong></td>
          <td style="font-size:0.85rem">${cat?cat.name:"—"}</td>
          <td>${formatCurrency(p.price)}</td>
          <td>${p.total_rooms}</td>
          <td>${p.available_rooms}</td>
          <td><span class="badge ${p.is_active?'badge-approved':'badge-rejected'}">${p.is_active?'Active':'Inactive'}</span></td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-sm btn-outline"
              onclick="openEdit(${p.id},${p.category_id},'${p.name.replace(/'/g,"\\'")}','${(p.description||'').replace(/'/g,"\\'")}',${p.price},${p.total_rooms},${p.available_rooms},${p.is_active})">
              ✏️ Edit
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteProd(${p.id})">🗑️ Delete</button>
          </td>
        </tr>`;
      }).join("")}
      </tbody></table></div>`;
  } catch (err) { document.getElementById("prodTable").innerHTML = `<p style="color:var(--danger)">${err.message}</p>`; }
}

async function addProduct() {
  const catId = document.getElementById("prodCat").value;
  const name  = document.getElementById("prodName").value.trim();
  const desc  = document.getElementById("prodDesc").value.trim();
  const price = document.getElementById("prodPrice").value;
  const total = document.getElementById("prodTotal").value;
  const avail = document.getElementById("prodAvail").value;
  const file  = document.getElementById("prodImage").files[0];
  if (!catId||!name||!price) { showAlert("prodAlert","Category, name and price are required."); return; }
  const form = new FormData();
  form.append("category_id",catId); form.append("name",name);
  form.append("description",desc||""); form.append("price",price);
  form.append("total_rooms",total); form.append("available_rooms",avail);
  if (file) form.append("image", file);
  try {
    await ProductAPI.create(form);
    showAlert("prodAlert","✅ Product added!","success");
    ["prodName","prodDesc","prodPrice"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("prodCat").value=""; document.getElementById("prodImage").value="";
    document.getElementById("prodTotal").value="1"; document.getElementById("prodAvail").value="1";
    await loadProducts();
  } catch(err) { showAlert("prodAlert",err.message); }
}

function openEdit(id,catId,name,desc,price,total,avail,isActive) {
  document.getElementById("editId").value     = id;
  document.getElementById("editCat").value    = catId;
  document.getElementById("editName").value   = name;
  document.getElementById("editDesc").value   = desc;
  document.getElementById("editPrice").value  = price;
  document.getElementById("editTotal").value  = total;
  document.getElementById("editAvail").value  = avail;
  document.getElementById("editStatus").value = isActive?"true":"false";
  document.getElementById("editImage").value  = "";
  document.getElementById("editAlert").innerHTML = "";
  document.getElementById("editModal").classList.remove("hidden");
}
function closeEdit() { document.getElementById("editModal").classList.add("hidden"); }

async function saveEdit() {
  const id          = document.getElementById("editId").value;
  const category_id = parseInt(document.getElementById("editCat").value);
  const name        = document.getElementById("editName").value.trim();
  const desc        = document.getElementById("editDesc").value.trim();
  const price       = parseFloat(document.getElementById("editPrice").value);
  const total_rooms = parseInt(document.getElementById("editTotal").value);
  const available_rooms = parseInt(document.getElementById("editAvail").value);
  const is_active   = document.getElementById("editStatus").value === "true";
  const file        = document.getElementById("editImage").files[0];
  if (!name||!price) { showAlert("editAlert","Name and price are required."); return; }
  try {
    await ProductAPI.update(id, { category_id,name,description:desc,price,total_rooms,available_rooms,is_active });
    if (file) {
      const form = new FormData(); form.append("image",file);
      await ProductAPI.updateImage(id, form);
    }
    showAlert("editAlert","✅ Product updated!","success");
    setTimeout(()=>{ closeEdit(); loadProducts(); }, 900);
  } catch(err) { showAlert("editAlert",err.message); }
}

async function deleteProd(id) {
  if (!confirm("Delete this product?")) return;
  try { await ProductAPI.delete(id); await loadProducts(); }
  catch(err) { alert(err.message); }
}
</script>
</body>
</html>
