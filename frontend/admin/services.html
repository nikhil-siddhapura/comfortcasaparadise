<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Services — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">🏨 <span>Royal Resort</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="categories.html"><span class="icon">🏷️</span><span>Categories</span></a>
      <a href="products.html"><span class="icon">🛏️</span><span>Products</span></a>
      <a href="bookings.html"><span class="icon">📅</span><span>Bookings</span></a>
      <a href="users.html"><span class="icon">👥</span><span>Users</span></a>
      <a href="contacts.html"><span class="icon">✉️</span><span>Messages</span></a>
      <a href="services.html" class="active"><span class="icon">✨</span><span>Services</span></a>
    </nav>
    <div class="sidebar-footer"><a href="../login.html" onclick="clearAuth()"><span class="icon">🚪</span><span>Logout</span></a></div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar"><h1>✨ Services Management</h1></div>
    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-card-header"><h3>➕ Add New Service</h3></div>
        <div class="admin-card-body">
          <div id="svcAlert"></div>
          <div class="form-row">
            <div class="form-group"><label>Service Name *</label><input type="text" class="form-control" id="svcName" placeholder="e.g. Spa & Wellness"/></div>
            <div class="form-group"><label>Price (₹) *</label><input type="number" class="form-control" id="svcPrice" placeholder="2999"/></div>
          </div>
          <div class="form-group"><label>Description</label><textarea class="form-control" id="svcDesc" rows="2" placeholder="Brief description..."></textarea></div>
          <div class="form-group"><label>Image (optional)</label><input type="file" class="form-control" id="svcImage" accept="image/*"/></div>
          <button class="btn btn-primary" onclick="addService()">➕ Add Service</button>
        </div>
      </div>
      <div class="admin-card">
        <div class="admin-card-header"><h3>All Services</h3></div>
        <div class="admin-card-body"><div id="svcTable"><div class="spinner"></div></div></div>
      </div>
    </div>
  </main>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeEdit()">×</button>
    <div class="modal-title">✏️ Edit Service</div>
    <div id="editAlert"></div>
    <div class="form-group"><label>Name *</label><input type="text" class="form-control" id="editName"/></div>
    <div class="form-group"><label>Description</label><textarea class="form-control" id="editDesc" rows="2"></textarea></div>
    <div class="form-group"><label>Price (₹) *</label><input type="number" class="form-control" id="editPrice"/></div>
    <div class="form-group"><label>Status</label>
      <select class="form-control" id="editStatus">
        <option value="true">✅ Active</option>
        <option value="false">❌ Inactive</option>
      </select>
    </div>
    <div class="form-group"><label>🖼️ Update Image (optional)</label><input type="file" class="form-control" id="editImage" accept="image/*"/></div>
    <input type="hidden" id="editId"/>
    <button class="btn btn-primary btn-block" onclick="saveEdit()">💾 Save Changes</button>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
window.addEventListener("DOMContentLoaded", async () => {
  if (!isAdmin()) { window.location.href = "../login.html"; return; }
  await loadServices();
});

async function loadServices() {
  try {
    const services = await ServiceAPI.getAllAdmin();         // admin/all endpoint
    const el = document.getElementById("svcTable");
    if (!services.length) { el.innerHTML = `<p style="color:var(--muted)">No services yet.</p>`; return; }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Description</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${services.map(s => `
        <tr>
          <td>#${s.id}</td>
          <td>${s.image
            ? `<img src="${imageUrl(s.image)}" style="width:55px;height:42px;object-fit:cover;border-radius:4px"/>`
            : `<div style="width:55px;height:42px;background:#117a65;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white">✨</div>`}</td>
          <td><strong>${s.name}</strong></td>
          <td style="max-width:200px;color:var(--muted);font-size:0.88rem">${s.description||"—"}</td>
          <td>${formatCurrency(s.price)}</td>
          <td><span class="badge ${s.is_active?'badge-approved':'badge-rejected'}">${s.is_active?'Active':'Inactive'}</span></td>
          <td style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-sm btn-outline"
              onclick="openEdit(${s.id},'${s.name.replace(/'/g,"\\'")}','${(s.description||'').replace(/'/g,"\\'")}',${s.price},${s.is_active})">
              ✏️ Edit
            </button>
            <button class="btn btn-sm btn-danger" onclick="deleteSvc(${s.id})">🗑️ Delete</button>
          </td>
        </tr>`).join("")}
      </tbody></table></div>`;
  } catch (err) { document.getElementById("svcTable").innerHTML = `<p style="color:var(--danger)">${err.message}</p>`; }
}

async function addService() {
  const name  = document.getElementById("svcName").value.trim();
  const price = document.getElementById("svcPrice").value;
  const desc  = document.getElementById("svcDesc").value.trim();
  const file  = document.getElementById("svcImage").files[0];
  if (!name||!price) { showAlert("svcAlert","Name and price are required."); return; }
  const form = new FormData();
  form.append("name",name); form.append("price",price); form.append("description",desc||"");
  if (file) form.append("image",file);
  try {
    await ServiceAPI.create(form);
    showAlert("svcAlert","✅ Service added!","success");
    ["svcName","svcPrice","svcDesc"].forEach(id=>document.getElementById(id).value="");
    document.getElementById("svcImage").value="";
    await loadServices();
  } catch(err) { showAlert("svcAlert",err.message); }
}

function openEdit(id,name,desc,price,isActive) {
  document.getElementById("editId").value     = id;
  document.getElementById("editName").value   = name;
  document.getElementById("editDesc").value   = desc;
  document.getElementById("editPrice").value  = price;
  document.getElementById("editStatus").value = isActive?"true":"false";
  document.getElementById("editImage").value  = "";
  document.getElementById("editAlert").innerHTML = "";
  document.getElementById("editModal").classList.remove("hidden");
}
function closeEdit() { document.getElementById("editModal").classList.add("hidden"); }

async function saveEdit() {
  const id        = document.getElementById("editId").value;
  const name      = document.getElementById("editName").value.trim();
  const desc      = document.getElementById("editDesc").value.trim();
  const price     = parseFloat(document.getElementById("editPrice").value);
  const is_active = document.getElementById("editStatus").value === "true";
  const file      = document.getElementById("editImage").files[0];
  if (!name||!price) { showAlert("editAlert","Name and price are required."); return; }
  try {
    await ServiceAPI.update(id, { name, description:desc, price, is_active });
    if (file) {
      const form = new FormData(); form.append("image",file);
      await ServiceAPI.updateImage(id, form);
    }
    showAlert("editAlert","✅ Service updated!","success");
    setTimeout(()=>{ closeEdit(); loadServices(); }, 900);
  } catch(err) { showAlert("editAlert",err.message); }
}

async function deleteSvc(id) {
  if (!confirm("Delete this service?")) return;
  try { await ServiceAPI.delete(id); await loadServices(); }
  catch(err) { alert(err.message); }
}
</script>
</body>
</html>
