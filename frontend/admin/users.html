<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Users — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">🏨 <span>Royal Resort</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="categories.html"><span class="icon">🏷️</span><span>Categories</span></a>
      <a href="products.html"><span class="icon">🛏️</span><span>Products</span></a>
      <a href="bookings.html"><span class="icon">📅</span><span>Bookings</span></a>
      <a href="users.html" class="active"><span class="icon">👥</span><span>Users</span></a>
      <a href="contacts.html"><span class="icon">✉️</span><span>Messages</span></a>
      <a href="services.html"><span class="icon">✨</span><span>Services</span></a>
    </nav>
    <div class="sidebar-footer"><a href="../login.html" onclick="clearAuth()"><span class="icon">🚪</span><span>Logout</span></a></div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar"><h1>👥 User Management</h1></div>
    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-card-header">
          <h3>All Registered Users</h3>
          <span id="userCount" style="font-size:0.85rem;color:var(--muted)"></span>
        </div>
        <div class="admin-card-body">
          <div id="usersTable"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/api.js"></script>
<script>
window.addEventListener("DOMContentLoaded", async () => {
  if (!isAdmin()) { window.location.href = "../login.html"; return; }
  try {
    const users = await UserAPI.getAllUsers();
    document.getElementById("userCount").textContent = `Total: ${users.length}`;
    const el = document.getElementById("usersTable");
    if (!users.length) { el.innerHTML = `<p style="color:var(--muted)">No users registered yet.</p>`; return; }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead>
        <tr><th>#</th><th>Avatar</th><th>Full Name</th><th>Email</th><th>Phone</th><th>Status</th><th>Joined</th></tr>
      </thead>
      <tbody>
        ${users.map(u => `
          <tr>
            <td>#${u.id}</td>
            <td>${u.profile_image
              ? `<img src="${imageUrl(u.profile_image)}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid var(--primary)"/>`
              : `<div style="width:38px;height:38px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:white;font-size:1rem">👤</div>`}</td>
            <td><strong>${u.full_name}</strong></td>
            <td>${u.email}</td>
            <td>${u.phone || "—"}</td>
            <td><span class="badge ${u.is_active ? 'badge-approved' : 'badge-rejected'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
            <td>${formatDate(u.created_at)}</td>
          </tr>`).join("")}
      </tbody>
    </table></div>`;
  } catch (err) {
    document.getElementById("usersTable").innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
  }
});
</script>
</body>
</html>
