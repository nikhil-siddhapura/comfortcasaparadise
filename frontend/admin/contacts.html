<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Messages — Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/admin.css"/>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">🏨 <span>Royal Resort</span></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><span class="icon">📊</span><span>Dashboard</span></a>
      <a href="categories.html"><span class="icon">🏷️</span><span>Categories</span></a>
      <a href="products.html"><span class="icon">🛏️</span><span>Products</span></a>
      <a href="bookings.html"><span class="icon">📅</span><span>Bookings</span></a>
      <a href="users.html"><span class="icon">👥</span><span>Users</span></a>
      <a href="contacts.html" class="active"><span class="icon">✉️</span><span>Messages</span></a>
      <a href="services.html"><span class="icon">✨</span><span>Services</span></a>
    </nav>
    <div class="sidebar-footer"><a href="../login.html" onclick="clearAuth()"><span class="icon">🚪</span><span>Logout</span></a></div>
  </aside>
  <main class="admin-main">
    <div class="admin-topbar"><h1>✉️ Contact Messages</h1></div>
    <div class="admin-content">
      <div class="admin-card">
        <div class="admin-card-header"><h3>All Messages</h3></div>
        <div class="admin-card-body">
          <div id="contactAlert"></div>
          <div id="contactsTable"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- REPLY MODAL -->
<div class="modal-overlay hidden" id="replyModal">
  <div class="modal">
    <button class="modal-close" onclick="closeReply()">×</button>
    <div class="modal-title">✉️ Reply to Message</div>
    <div id="msgPreview" style="background:var(--light);padding:14px;border-radius:8px;margin-bottom:16px;font-size:0.9rem"></div>
    <div id="replyAlert"></div>
    <div class="form-group">
      <label>Your Reply *</label>
      <textarea class="form-control" id="replyText" rows="5"
        placeholder="Type your reply to the user..."></textarea>
    </div>
    <input type="hidden" id="replyContactId"/>
    <button class="btn btn-primary btn-block" onclick="sendReply()">📨 Send Reply</button>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
window.addEventListener("DOMContentLoaded", async () => {
  if (!isAdmin()) { window.location.href = "../login.html"; return; }
  await loadContacts();
});

async function loadContacts() {
  try {
    const contacts = await ContactAPI.getAll();
    const el = document.getElementById("contactsTable");
    if (!contacts.length) { el.innerHTML = `<p style="color:var(--muted)">No messages yet.</p>`; return; }

    el.innerHTML = `<div class="table-wrap"><table>
      <thead>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Subject</th><th>Message</th><th>Read</th><th>Reply Sent</th><th>Date</th><th>Action</th></tr>
      </thead>
      <tbody>
        ${contacts.map(c => `
          <tr style="${!c.is_read ? 'background:#fffdf0;font-weight:600' : ''}">
            <td>#${c.id}</td>
            <td>${c.name}</td>
            <td style="font-size:0.85rem">${c.email}</td>
            <td style="font-size:0.85rem">${c.subject || "—"}</td>
            <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.85rem" title="${c.message}">${c.message}</td>
            <td><span class="badge ${c.is_read ? 'badge-approved' : 'badge-pending'}">${c.is_read ? '✓ Read' : 'New'}</span></td>
            <td style="max-width:150px;font-size:0.82rem;color:var(--muted)">${c.admin_reply ? '✅ Replied' : '—'}</td>
            <td style="font-size:0.82rem">${formatDate(c.created_at)}</td>
            <td>
              <button class="btn btn-sm btn-primary"
                onclick="openReply(${c.id},'${c.name.replace(/'/g,"\\'")}','${c.message.replace(/'/g,"\\'").replace(/\n/g," ")}','${(c.admin_reply||'').replace(/'/g,"\\'")}')">
                ✏️ Reply
              </button>
            </td>
          </tr>`).join("")}
      </tbody>
    </table></div>`;
  } catch (err) {
    document.getElementById("contactsTable").innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
  }
}

function openReply(id, name, message, existingReply) {
  document.getElementById("replyContactId").value = id;
  document.getElementById("replyText").value       = existingReply || "";
  document.getElementById("replyAlert").innerHTML  = "";
  document.getElementById("msgPreview").innerHTML  = `
    <strong>From:</strong> ${name}<br/>
    <strong>Message:</strong> ${message}
    ${existingReply ? `<br/><br/><strong style="color:var(--success)">Previous Reply:</strong> ${existingReply}` : ""}`;
  document.getElementById("replyModal").classList.remove("hidden");
}
function closeReply() { document.getElementById("replyModal").classList.add("hidden"); }

async function sendReply() {
  const id    = document.getElementById("replyContactId").value;
  const reply = document.getElementById("replyText").value.trim();
  if (!reply) { showAlert("replyAlert", "Please type a reply."); return; }
  try {
    await ContactAPI.reply(id, reply);
    showAlert("replyAlert", "✅ Reply sent successfully!", "success");
    setTimeout(() => { closeReply(); loadContacts(); }, 1000);
  } catch (err) { showAlert("replyAlert", err.message); }
}
</script>
</body>
</html>
