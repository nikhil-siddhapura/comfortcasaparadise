name: Deploy Website to Ubuntu Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        env:
          SUDO_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: "2204"
          envs: SUDO_PASSWORD
          script: |
            set -e  # જો કોઈ એરર આવે તો સ્ક્રિપ્ટ અટકાવી દેશે (જેથી લાલ ચોકડી દેખાય)
            
            # સર્વરના સાચા ફોલ્ડરમાં જાવ
            cd /var/www/comfortcasaparadise
            
            # સર્વર પરના જૂના ફેરફારો જબરદસ્તી કાઢી નાખો 
            git reset --hard HEAD
            git clean -fd
            
            # નવો કોડ ગિટહબ પરથી ડાઉનલોડ કરો
            git pull origin main
            
            # બેકએન્ડ ફોલ્ડરમાં જાવ
            cd backend
            
            # વર્ચ્યુઅલ એન્વાયર્નમેન્ટ (venv) ચાલુ કરો
            source venv/bin/activate || source ../venv/bin/activate || echo "No venv found"
            
            # લાયબ્રેરી ઇન્સ્ટોલ કરો
            pip install -r requirements.txt
            
            # સર્વર રીસ્ટાર્ટ કરો
            echo "$SUDO_PASSWORD" | sudo -S systemctl restart comfortcasa
