name: Deploy Website to Ubuntu Server

# આ પ્રોસેસ ત્યારે જ ચાલશે જ્યારે 'main' બ્રાન્ચમાં push અથવા pull_request merge થશે
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ૧. ગિટહબમાંથી કોડ ચેકઆઉટ કરશે
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # ૨. SSH દ્વારા તમારા Ubuntu સર્વર સાથે કનેક્ટ થશે અને કમાન્ડ રન કરશે
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          REMOTE_PORT: "2204"
          script: |
            # તમારા સર્વર પર જ્યાં વેબસાઈટનો કોડ પડ્યો છે તે ફોલ્ડરના પાથ પર જાઓ
            cd /var/www/comfortcasaparadise

            # સર્વર પર ગિટનો કોડ લેટેસ્ટ અપડેટ કરો
            git pull origin main

            # જો તમારી વેબસાઈટ Node.js કે Laravel માં હોય, તો નીચેના કમાન્ડ વાપરી શકો (નહીં તો આ લાઈન્સ કાઢી નાખવી)
            # npm install
            # npm run build

            echo "Deployment successful!"
